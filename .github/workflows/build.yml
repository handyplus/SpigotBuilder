name: Build Spigot

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      rev:
        description: 'Spigot version'
        required: false
        default: '26.1.2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Resolve build version
        # 手动触发允许自定义版本，未填写时保持默认版本。
        run: echo "BUILD_REV=${{ github.event.inputs.rev || '26.1.2' }}" >> "$GITHUB_ENV"

      - name: Run BuildTools
        run: java -jar BuildTools.jar --rev "$BUILD_REV"

      - name: Archive generated jar
        uses: actions/upload-artifact@v6
        with:
          name: spigot-${{ env.BUILD_REV }}
          path: ./spigot-${{ env.BUILD_REV }}.jar
          retention-days: 3
