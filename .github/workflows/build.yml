name: Build Spigot 1.21.11

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run BuildTools
        run: java -jar BuildTools.jar --rev 1.21.11

      - name: Archive generated jar
        uses: actions/upload-artifact@v5
        with:
          name: spigot-1.21.11
          path: ./spigot-1.21.11.jar
          retention-days: 7
