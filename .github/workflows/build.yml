name: Build Spigot 1.21.11

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Run BuildTools
        run: java -jar BuildTools.jar --rev 26.1

      - name: Archive generated jar
        uses: actions/upload-artifact@v6
        with:
          name: spigot-26.1
          path: ./spigot-26.1.jar
          retention-days: 7
